<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Simple Ordered List</h1>
    <ol>
        <li>Laptop</li>
        <li>Mouse</li>
        <li>Keyboard</li>
    </ol>
    <h1>Ordered List with different format</h1>
    <ol type="A">
        <li>Laptop</li>
        <li>Mouse</li>
        <li>Keyboard</li>
    </ol>
    <h1>Unordered List</h1>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>cherry</li>
    </ul>
    <h2>Table</h2>
    <table border="5">
        <caption>School of Thrones</caption>
        <tr>
            <th>Roll No.</th>
            <th>Name</th>
            <th>Contact No.</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John Snow</td>
            <td>0000000000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Arya Stark</td>
            <td>1111111111</td>
        </tr>
        <tr>
            <td colspan="3">GAME OF THRONES</td>
        </tr>
    </table>
</body>
</html>
