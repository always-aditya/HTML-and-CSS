<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form for html</title>
</head>
<body>
    <form action="/upload.php" method="post" enctype="multipart/form-data">
        This one by using value <br>
        <label for="username1">Username1</label>
        <input type="text" id="username1" value="Arya Stark" name="username1" required><br>
        This one by using placeholder<br>
        <label for="username2">Username2</label>
        <input type="text" id="username2" placeholder="Arya Stark" name="username2" required><br>
        <label for="pwd">Password</label>
        <input type="password" id="pwd" placeholder="password" name="password" required><br>
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required><br>
        <label for="file">file</label>
        <input type="file" id="file" name="file" required><br>
        <label for="color">colour</label>
        <input type="color" id="color" name="color"><br>
        <label for="volume">Volume</label>
        <input type="range" id="volume" min="0" max="100" step="20" name="volume"><br>
        Gender:<br>
        <label for="male">male</label>
        <input type="radio" id="male" value="male" name="gender" required>
        <label for="female">Female</label>
        <input type="radio" id="female" value="female" name="gender" required>
        <label for="other">other</label>
        <input type="radio" id="other" value="other" name="gender" required><br>
        Fruits:<br>
        <label for="apple">Apple</label>
        <input type="checkbox" id="apple" value="apple" name="fruits">
        <label for="banana">Banana</label>
        <input type="checkbox" id="banana" value="banana" name="fruits">
        <label for="cherry">Cherry</label>
        <input type="checkbox" id="cherry" value="cherry" name="fruits"><br>
        <label for="onefruit">Select one fruit</label>
        <select id="onefruit" name="onefruits" required>
            <option value="">Please Select</option>
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
            <option value="papaya">Papaya</option>
        </select><br>
        <label for="feedback">Your Feedback</label><br>
        <textarea id="feedback" rows="4" cols="30" placeholder="Enter Your Feedback Here" name="user_feedback"></textarea><br>
        Button<input type="button" value="click me" onclick="alert('HELLO')"><br>
        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </form>
</body>
</html>
